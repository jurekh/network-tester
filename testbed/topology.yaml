# Declarative testbed topology. The nt-testbed script reads this file; later
# stages extend it (data VLANs, bonds, rack 2, inter-rack links) without
# changing the script's command surface.

# Outer LXD VM that contains the whole testbed.
vm:
  name: nt-testbed
  image: ubuntu:24.04
  cpu: 10
  memory: 24GiB
  disk: 100GiB
  # Multi-rack (stage 7) raises this from the single-rack 16GiB/8 CPU. This is
  # the design profile: 24GiB with two data nodes per rack. CPU is 10 so the
  # five composed nodes (9 vCPUs total at MAAS overcommit 1.0) fit with room
  # for the testbed services. A reduced 20GiB/8 CPU profile (rack 2 with a
  # single data node) fits smaller hosts; see README.md.

maas:
  # Snap channel for the maas snap; maas-test-db follows the same channel.
  # Changing this on an existing testbed requires `nt-testbed down && up`.
  channel: 3.7/stable
  admin_user: admin
  admin_password: testbed
  admin_email: admin@nt-testbed.local
  vm_host_name: rack1-lxd

# PXE/BMC/compose network for rack 1, served by MAAS DHCP inside the testbed VM.
# Nodes compose here without auto-commissioning, then their boot NIC moves to
# its management bridge (mgmt/oam below) and the data NICs attach before a single
# commission records everything. This segment keeps the MAAS region, inner LXD
# API, and the Juju controller container, whose ARP traffic must not appear on
# the segments the vlan-neighbor-validator captures on.
#
# `bridge` is a Linux bridge, not OVS: MAAS's resource scanner does not report
# OVS datapath bridges as interfaces, so pods composed against an OVS bridge
# fall back to macvlan (composed VMs then cannot reach the testbed VM's DHCP,
# which is the macvlan parent) and the LXD BMC power query fails ("no rack
# controllers can access the BMC"). A Linux bridge is reported reliably, so the
# PXE/BMC/compose segment lives here. `ovs_bridge` is the OVS bridge that carries
# the tagged data VLAN and the LACP bonds; node data NICs move there (bridged)
# while the node is Ready, before its single commission.
pxe:
  bridge: br-pxe
  ovs_bridge: br-rack1
  cidr: 10.100.1.0/24
  gateway: 10.100.1.1          # testbed VM address on the PXE bridge
  dhcp_range: {start: 10.100.1.100, end: 10.100.1.200}

# Rack-1 segments. Management VLANs (mgmt, oam) are each their own Linux bridge
# (`bridge:`) on the testbed VM, served by the region+rack rackd like br-pxe:
# a node's boot NIC attaches there, so its first-boot PXE is served over a real
# Linux netdev and the node commissions once. A dedicated bridge per VLAN also
# isolates each management segment from the data VLAN with no access-VLAN trunk.
# The data VLAN stays an OVS access-port `tag:` on br-rack1, where the LACP bond
# needs OVS; MAAS models it as its own data fabric (ensure_data_segments). The
# data VLAN has a gateway only since stage 7: the rack-1 ToR router (FRR) owns
# gateway_ip so cross-rack traffic routes; same-rack L2 neighbor checks are
# unaffected.
vlans:
  mgmt:
    bridge: br-mgmt
    management: true
    cidr: 10.100.4.0/24
    gateway: 10.100.4.1
    dhcp_range: {start: 10.100.4.100, end: 10.100.4.200}
  oam:
    bridge: br-oam
    management: true
    cidr: 10.100.3.0/24
    gateway: 10.100.3.1
    dhcp_range: {start: 10.100.3.100, end: 10.100.3.200}
  data:
    tag: 100
    fabric: nt-data
    cidr: 10.100.2.0/24
    gateway: 10.100.2.254       # rack-1 FRR ToR (stage 7)

# Rack 2 (stage 7). A second OVS bridge inside the same testbed VM with its own
# rack controller container so MAAS derives rack identity from the boot VLAN's
# primary rack controller. Mirrors rack 1 but on a disjoint address space.
rack2:
  bridge: br-rack2              # OVS bridge: PXE access VLAN + data VLAN + bonds
  controller: nt-rack2          # MAAS rack controller (system container)
  pxe_access_vlan: 99           # OVS access VLAN isolating PXE from data VLAN 100
  # Rack-2 nodes boot on the br-rack2 PXE segment served by the rack-2
  # controller (no tagged management VLAN): MAAS derives a distinct rack from
  # the boot VLAN's primary rack controller, and an untagged boot avoids the
  # VLAN-interface mis-link MAAS hits when extra bridges exist.
  #
  # The PXE segment is an OVS access VLAN (pxe_access_vlan) rather than the
  # bridge's untagged native VLAN. An untagged OVS port is a trunk that also
  # carries the tagged data VLAN 100, so the data VLAN's broadcast ARP would
  # leak onto the boot NICs and the vlan-neighbor-validator (which strips the
  # 802.1q tag) would report data peers as unexpected neighbors on the PXE
  # interface. An access port carries only its own VLAN, so the boot NICs never
  # see the data VLAN. Endpoints still see untagged PXE, so MAAS's view and
  # DHCP are unchanged, and the gateway stays on br-rack2 (an OVS bridge MAAS's
  # scanner ignores) so the region controller gains no interface on the rack-2
  # PXE subnet. Rack 1 needs no access VLAN: its boot NICs are tagged onto the
  # mgmt VLAN (also isolated from data) after commissioning.
  pxe:
    cidr: 10.101.1.0/24
    gateway: 10.101.1.1         # testbed VM router address on br-rack2 (access VLAN)
    dhcp_range: {start: 10.101.1.100, end: 10.101.1.200}
  vlans:
    data:
      tag: 100
      fabric: nt-data-r2
      cidr: 10.100.6.0/24
      gateway: 10.100.6.254     # rack-2 FRR ToR

# ToR routers (stage 7): one FRR container per rack. Each owns its rack's data
# subnet gateway and peers eBGP with the other over an inter-rack /30,
# redistributing connected routes so cross-rack data traffic routes by BGP.
# Management/PXE traffic between racks routes via the testbed VM (static), so
# MAAS and Juju connectivity stays independent of the data-fabric routing.
routers:
  inter_rack_cidr: 10.100.5.0/30
  rack-1: {name: frr-rack1, asn: 65001, data_ip: 10.100.2.254, link_ip: 10.100.5.1}
  rack-2: {name: frr-rack2, asn: 65002, data_ip: 10.100.6.254, link_ip: 10.100.5.2}

# Node NICs: index 0 is the boot NIC. `vlan` names an entry in the rack's vlans
# (omit for the untagged PXE segment); `ip` is the STATIC address MAAS assigns,
# required so the topology JSON carries peer IPs before deployment.
#
# `bond` (data nodes): two extra member NICs aggregated into an OVS LACP bond
# (lacp=active, lacp-time=slow) on the host side and a matching 802.3ad bond
# inside MAAS. The bond carries the data VLAN tag and the STATIC data IP. The
# boot NIC stays on the mgmt VLAN so commissioning and the Juju agent never
# depend on the bonded data fabric. Each node's `rack` selects its bridge and
# networks (rack-1 -> br-rack1/pxe/vlans, rack-2 -> br-rack2/rack2).
racks:
  rack-1:
    nodes:
      - hostname: r1-data-01
        role: data
        cpu: 2
        memory_mib: 2048
        disk_gib: 8
        nics:
          - bridge: br-mgmt
            vlan: mgmt
            ip: 10.100.4.11
        bond:
          name: bond0
          mode: 802.3ad
          vlan: data
          ip: 10.100.2.11
          members: 2
      - hostname: r1-data-02
        role: data
        cpu: 2
        memory_mib: 2048
        disk_gib: 8
        nics:
          - bridge: br-mgmt
            vlan: mgmt
            ip: 10.100.4.12
        bond:
          name: bond0
          mode: 802.3ad
          vlan: data
          ip: 10.100.2.12
          members: 2
      - hostname: r1-oam-01
        role: bmc-oam
        cpu: 1
        # 1024 MiB is not enough to run the MAAS ephemeral image (it runs
        # from RAM); commissioning stalls with the VM memory-exhausted.
        memory_mib: 2048
        disk_gib: 8
        nics:
          - bridge: br-oam
            vlan: oam
            ip: 10.100.3.11
  rack-2:
    nodes:
      - hostname: r2-data-01
        role: data
        cpu: 2
        memory_mib: 2048
        disk_gib: 8
        nics:
          - bridge: br-rack2      # PXE access VLAN segment served by nt-rack2
            ip: 10.101.1.11
        bond:
          name: bond0
          mode: 802.3ad
          vlan: data
          ip: 10.100.6.11
          members: 2
      - hostname: r2-data-02
        role: data
        cpu: 2
        memory_mib: 2048
        disk_gib: 8
        nics:
          - bridge: br-rack2      # PXE access VLAN segment served by nt-rack2
            ip: 10.101.1.12
        bond:
          name: bond0
          mode: 802.3ad
          vlan: data
          ip: 10.100.6.12
          members: 2
